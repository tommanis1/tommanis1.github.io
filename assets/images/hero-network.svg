<svg width="1040" height="560" viewBox="0 0 1040 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blob-top" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#087963" stop-opacity="0.075"/>
      <stop offset="0.52" stop-color="#087963" stop-opacity="0.04"/>
      <stop offset="0.8" stop-color="#087963" stop-opacity="0.015"/>
      <stop offset="1" stop-color="#087963" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blob-lower" cx="56%" cy="52%" r="72%">
      <stop offset="0" stop-color="#087963" stop-opacity="0.09"/>
      <stop offset="0.54" stop-color="#087963" stop-opacity="0.047"/>
      <stop offset="0.82" stop-color="#087963" stop-opacity="0.018"/>
      <stop offset="1" stop-color="#087963" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blob-left" cx="50%" cy="50%" r="72%">
      <stop offset="0" stop-color="#087963" stop-opacity="0.065"/>
      <stop offset="0.52" stop-color="#087963" stop-opacity="0.033"/>
      <stop offset="0.8" stop-color="#087963" stop-opacity="0.012"/>
      <stop offset="1" stop-color="#087963" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="art-edge-fade" x1="0" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="black"/>
      <stop offset="0.14" stop-color="white"/>
      <stop offset="0.88" stop-color="white"/>
      <stop offset="1" stop-color="black"/>
    </linearGradient>

    <linearGradient id="dot-fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.25" stop-color="white"/>
      <stop offset="0.8" stop-color="white"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <mask id="diagram-fade" maskUnits="userSpaceOnUse" x="0" y="0" width="1040" height="560">
      <rect width="1040" height="560" fill="url(#art-edge-fade)"/>
    </mask>

    <mask id="dot-grid-fade">
      <rect width="180" height="130" fill="url(#dot-fade)"/>
    </mask>

    <pattern id="dots-faint" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#087963" fill-opacity="0.17"/>
    </pattern>

    <pattern id="dots-strong" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.35" fill="#087963" fill-opacity="0.42"/>
    </pattern>
  </defs>

  <style>
    .route-main,
    .route-soft,
    .route-faint {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-main {
      stroke: #087963;
      stroke-width: 1.85;
    }

    .route-soft {
      stroke: #087963;
      stroke-opacity: 0.34;
      stroke-width: 1.25;
    }

    .route-faint {
      stroke: #087963;
      stroke-opacity: 0.15;
      stroke-width: 1.1;
    }

    .node {
      fill: #087963;
    }

    .node-soft {
      fill: #087963;
      fill-opacity: 0.36;
    }

    .node-open {
      fill: #f8fbfa;
      stroke: #087963;
      stroke-width: 1.55;
    }

    .square {
      fill: #087963;
    }

    .square-soft {
      fill: #087963;
      fill-opacity: 0.42;
    }

    .route-main,
    .route-soft,
    .route-faint {
      stroke-dasharray: 1100;
      stroke-dashoffset: 1100;
      animation: draw 1.55s ease-out forwards;
    }

    .node,
    .node-soft,
    .node-open,
    .square,
    .square-soft {
      opacity: 0;
      animation: appear 0.45s ease-out forwards;
      animation-delay: 0.9s;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes appear {
      to {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .route-main,
      .route-soft,
      .route-faint {
        stroke-dashoffset: 0;
        animation: none;
      }

      .node,
      .node-soft,
      .node-open,
      .square,
      .square-soft {
        opacity: 1;
        animation: none;
      }
    }
  </style>

