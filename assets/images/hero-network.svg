<svg width="980" height="540" viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="first-blob-fade-gradient" x1="800" y1="0" x2="895" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white"/>
      <stop offset="0.28" stop-color="white"/>
      <stop offset="0.68" stop-color="white" stop-opacity="0.28"/>
      <stop offset="1" stop-color="black"/>
    </linearGradient>
    <mask id="first-blob-fade" maskUnits="userSpaceOnUse" x="120" y="-50" width="790" height="470">
      <rect x="120" y="-50" width="790" height="470" fill="url(#first-blob-fade-gradient)"/>
    </mask>
  </defs>

  <style>
    .blob {
      fill: #087963;
      fill-opacity: 0.07;
    }
    .blob-2 {
      fill: #087963;
      fill-opacity: 0.09;
    }
    .route-main {
      fill: none;
      stroke: #087963;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .route-soft {
      fill: none;
      stroke: #087963;
      stroke-opacity: 0.24;
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .route-faint {
      fill: none;
      stroke: #087963;
      stroke-opacity: 0.12;
      stroke-width: 1.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .node { fill: #087963; }
    .node-soft {
      fill: #087963;
      fill-opacity: 0.35;
    }
    .node-open {
      fill: #f8fbfa;
      stroke: #087963;
      stroke-width: 1.6;
    }
    .diamond { fill: #087963; }
    .dot {
      fill: #087963;
      fill-opacity: 0.34;
    }
    .dot-faint {
      fill: #087963;
      fill-opacity: 0.16;
    }
    .route-main,
    .route-soft,
    .route-faint {
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: draw 1.6s ease-out forwards;
    }
    .node,
    .node-soft,
    .node-open,
    .diamond {
      opacity: 0;
      animation: appear 0.5s ease-out forwards;
      animation-delay: 1s;
    }
    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }
    @keyframes appear {
      to {
        opacity: 1;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .route-main,
      .route-soft,
      .route-faint {
        stroke-dashoffset: 0;
        animation: none;
      }
      .node,
      .node-soft,
      .node-open,
      .diamond {
        opacity: 1;
        animation: none;
      }
    }
  </style>

