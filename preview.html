<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Right-Side Shape</title>

  <style>
    :root {
      --bg: #f8fbfa;
      --green: #087963;
      --green-soft: rgba(8, 121, 99, 0.14);
      --green-faint: rgba(8, 121, 99, 0.07);
      --line-soft: rgba(8, 121, 99, 0.24);
      --text: #17201c;
      --muted: #5f6864;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      position: relative;
      min-height: 620px;
      overflow: hidden;
      background:
        linear-gradient(180deg, #ffffff 0%, #f6faf8 100%);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .hero-content {
      position: relative;
      z-index: 3;
      width: 42%;
      min-width: 420px;
      padding: 120px 0 0 7vw;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--green);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.8rem, 6vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.055em;
      font-weight: 850;
    }

    .accent {
      width: 64px;
      height: 4px;
      margin: 28px 0 24px;
      background: var(--green);
      border-radius: 999px;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: 1.45rem;
      color: var(--text);
    }

    .bio {
      max-width: 460px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .abstract-graphic {
      position: absolute;
      z-index: 1;
      right: -80px;
      top: 40px;
      width: min(960px, 68vw);
      height: 540px;
      pointer-events: none;
    }

    .abstract-graphic svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    /*
      Soft translucent background blobs.
      These are what make the diagram feel less rigid.
    */
    .blob {
      fill: var(--green-faint);
    }

    .blob-2 {
      fill: rgba(8, 121, 99, 0.09);
    }

    /*
      Thin pale routing lines.
      These give the shape its abstract circuit/tree feeling.
    */
    .route-soft {
      fill: none;
      stroke: var(--line-soft);
      stroke-width: 1.2;
    }

    /*
      Main darker green tree lines.
      The round linecap makes them feel smoother and more organic.
    */
    .route-main {
      fill: none;
      stroke: var(--green);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-faint {
      fill: none;
      stroke: rgba(8, 121, 99, 0.12);
      stroke-width: 1.1;
      stroke-linecap: round;
    }

    /*
      Dots and diamonds along the routes.
    */
    .node {
      fill: var(--green);
    }

    .node-soft {
      fill: rgba(8, 121, 99, 0.35);
    }

    .node-open {
      fill: #f8fbfa;
      stroke: var(--green);
      stroke-width: 1.6;
    }

    .diamond {
      fill: var(--green);
      transform-box: fill-box;
      transform-origin: center;
    }

    /*
      Dotted matrix texture.
    */
    .dot {
      fill: rgba(8, 121, 99, 0.34);
    }

    .dot-faint {
      fill: rgba(8, 121, 99, 0.16);
    }

    /*
      Small animation is optional.
      Remove this block if you want it completely static.
    */
    .route-main,
    .route-soft,
    .route-faint {
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: draw 1.6s ease-out forwards;
    }

    .node,
    .node-soft,
    .node-open,
    .diamond {
      opacity: 0;
      animation: appear 0.5s ease-out forwards;
      animation-delay: 1s;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes appear {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .hero {
        min-height: 760px;
      }

      .hero-content {
        width: auto;
        min-width: 0;
        padding: 80px 28px 0;
      }

      .abstract-graphic {
        top: 330px;
        right: -360px;
        width: 850px;
        opacity: 0.75;
      }
    }
  </style>
</head>
